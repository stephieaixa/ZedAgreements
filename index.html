<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZED Agreements — Vueling · Beneficiarios</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F2; --surface: #FFFFFF; --surface-2: #F0EFE9;
  --border: #E2E0D8; --border-strong: #C8C5BA;
  --text-primary: #1A1917; --text-secondary: #6B6860; --text-muted: #9E9C96;
  --accent: #E8420A; --accent-light: #FDF0EC;
  --green: #1A6B3C; --green-bg: #EBF5EF;
  --amber: #8A5C00; --amber-bg: #FEF6E4;
  --red: #8B1A1A; --red-bg: #FDEAEA;
  --mono: 'JetBrains Mono', monospace; --sans: 'Inter', system-ui, sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
body { font-family: var(--sans); background: var(--bg); color: var(--text-primary); min-height: 100vh; font-size: 14px; line-height: 1.5; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 200; }
.logo { background: var(--accent); color: #fff; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; padding: 5px 10px; border-radius: 4px; }
header h1 { font-size: 14px; font-weight: 500; }
header .ref { font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-left: auto; }
.warning { background: var(--amber-bg); border-bottom: 1px solid #F0D080; padding: 9px 28px; font-size: 12px; color: var(--amber); display: flex; align-items: center; gap: 8px; }
.layout { display: flex; }
aside { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 16px; position: sticky; top: 93px; height: calc(100vh - 93px); overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.filter-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 8px; }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
input[type="text"] { width: 100%; padding: 7px 9px 7px 30px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text-primary); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.15s; }
input[type="text"]:focus { border-color: var(--accent); }
.sidebar-btns { display: flex; flex-direction: column; gap: 3px; }
.sidebar-btn { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 6px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: var(--sans); font-size: 13px; color: var(--text-secondary); transition: background 0.1s, color 0.1s; }
.sidebar-btn:hover { background: var(--surface-2); color: var(--text-primary); }
.sidebar-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.sidebar-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sidebar-btn .cnt { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.sidebar-btn.active .cnt { color: var(--accent); }
.stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.stat { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
.stat strong { font-weight: 600; color: var(--text-primary); font-family: var(--mono); font-size: 15px; }
.sdiv { width: 1px; height: 14px; background: var(--border); }
.dest-bar { background: var(--surface-2); border-bottom: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.dest-bar label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.dest-bar .search-wrap { flex: 1; max-width: 340px; }
.dest-bar input { background: var(--surface); }
.dest-tag { font-size: 12px; background: var(--accent-light); color: var(--accent); border-radius: 99px; padding: 3px 10px; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
.dest-tag button { border: none; background: none; color: var(--accent); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; }
.dest-hint { font-size: 12px; color: var(--text-muted); }
main { flex: 1; padding: 24px 28px; min-width: 0; }
.zone-section { margin-bottom: 32px; }
.zone-title { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.zone-num { font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px; }
.zone-title h2 { font-size: 14px; font-weight: 600; }
.zone-title .zcnt { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: left; padding: 7px 11px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); background: var(--surface-2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
tbody tr { border-bottom: 1px solid var(--border); background: var(--surface); transition: background 0.1s; cursor: pointer; }
tbody tr:hover { background: #FDF5F2; }
tbody tr.highlighted { background: #FDF0EC; }
td { padding: 9px 11px; vertical-align: middle; }
.td-iata { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text-secondary); width: 52px; }
.td-name { font-weight: 500; }
.td-status { width: 170px; }
.td-dest { width: 150px; }
.td-note { color: var(--text-secondary); font-size: 12px; }
.dest-count { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
.dest-count strong { color: var(--text-primary); font-weight: 500; }
.click-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-ok { background: var(--green-bg); color: var(--green); }
.badge-cond { background: var(--amber-bg); color: var(--amber); }
.badge-no { background: var(--red-bg); color: var(--red); }
.badge-dest { background: var(--accent-light); color: var(--accent); }
.empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty p { margin-top: 8px; font-size: 14px; }
.legend { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-secondary); }
.panel-overlay { display: none; position: fixed; inset: 0; background: rgba(26,25,23,0.4); z-index: 300; }
.panel-overlay.open { display: block; }
.panel { position: fixed; right: 0; top: 0; bottom: 0; width: 480px; background: var(--surface); border-left: 1px solid var(--border); z-index: 301; display: flex; flex-direction: column; overflow: hidden; transform: translateX(100%); transition: transform 0.22s ease; }
.panel.open { transform: translateX(0); }
.panel-head { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
.panel-head-info { flex: 1; min-width: 0; }
.panel-iata { font-family: var(--mono); font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.panel-name { font-size: 17px; font-weight: 600; }
.panel-close { border: none; background: var(--surface-2); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0; transition: background 0.1s; }
.panel-close:hover { background: var(--border); }
.panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.panel-section { margin-bottom: 24px; }
.panel-section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.info-block { background: var(--surface-2); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.info-key { color: var(--text-muted); width: 130px; flex-shrink: 0; font-size: 12px; }
.info-val { color: var(--text-primary); font-weight: 500; }
.dest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
.dest-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; }
.dest-card.match { background: var(--accent-light); border-color: #F0A080; }
.dest-city { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
.dest-code { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.dest-card.match .dest-code { color: var(--accent); }
.panel-note-sm { font-size: 12px; color: var(--text-secondary); background: var(--surface-2); border-radius: 8px; padding: 10px 12px; line-height: 1.6; }
aside::-webkit-scrollbar, .panel-body::-webkit-scrollbar { width: 4px; }
aside::-webkit-scrollbar-thumb, .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-width: 768px) {
  aside { display: none; }
  main { padding: 16px; }
  .stats-bar, .dest-bar { padding: 10px 16px; }
  header { padding: 12px 16px; }
  .panel { width: 100%; }
}
</style>
</head>

let activeZone="all",activeStatus="all",airlineQ="",destQ="",destActive="";

function badge(s){
  const icons={yes:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',cond:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',no:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'};
  const labels={yes:"Sin acompañante",cond:"Con condiciones",no:"Requiere empleado"};
  const cls={yes:"badge-ok",cond:"badge-cond",no:"badge-no"};
  return `<span class="badge ${cls[s]}">${icons[s]}${labels[s]}</span>`;
}

function destMatch(a,q){return q&&a.dests.some(d=>d.city.toLowerCase().includes(q)||d.code.toLowerCase().includes(q));}

function render(){
  const aq=airlineQ.toLowerCase(),dq=destActive.toLowerCase();
  const pool=DATA.filter(a=>{
    return (activeZone==="all"||String(a.zone)===activeZone)&&
           (activeStatus==="all"||a.status===activeStatus)&&
           (!aq||a.name.toLowerCase().includes(aq)||a.iata.toLowerCase().includes(aq))&&
           (!dq||destMatch(a,dq));
  });
  document.getElementById("s-total").textContent=pool.length;
  document.getElementById("s-ok").textContent=pool.filter(a=>a.status==="yes").length;
  document.getElementById("s-cond").textContent=pool.filter(a=>a.status==="cond").length;
  document.getElementById("s-no").textContent=pool.filter(a=>a.status==="no").length;
  const fc=DATA.filter(a=>(activeStatus==="all"||a.status===activeStatus)&&(!aq||a.name.toLowerCase().includes(aq)||a.iata.toLowerCase().includes(aq))&&(!dq||destMatch(a,dq)));
  document.getElementById("cnt-all").textContent=fc.length;
  [1,2,3,4,5,6].forEach(z=>{const el=document.getElementById("cnt-"+z);if(el)el.textContent=fc.filter(a=>a.zone===z).length;});
  document.getElementById("dest-hint").textContent=dq?`Aerolíneas que vuelan a "${destActive}"`:""
  const tw=document.getElementById("dest-tag-wrap");
  if(dq){tw.style.display="inline-flex";tw.innerHTML=`<span class="dest-tag">${destActive} <button onclick="clearDest()" aria-label="Quitar filtro">×</button></span>`;}else tw.style.display="none";
  const byZ={};pool.forEach(a=>{if(!byZ[a.zone])byZ[a.zone]=[];byZ[a.zone].push(a);});
  const main=document.getElementById("main");
  if(!pool.length){main.innerHTML='<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No se encontraron aerolíneas con estos filtros.</p></div>';return;}
  main.innerHTML=Object.keys(byZ).sort((a,b)=>a-b).map(z=>{
    const zn=parseInt(z),info=ZONES[zn],rows=byZ[z];
    return`<div class="zone-section"><div class="zone-title"><span class="zone-num" style="background:${info.bg};color:${info.color}">Zona ${z}</span><h2>${info.name}</h2><span class="zcnt">${rows.length} aerolínea${rows.length!==1?"s":""}</span></div><div class="table-wrap"><table><thead><tr><th>IATA</th><th>Aerolínea</th><th>Beneficiario</th><th>Destinos</th><th>Notas</th></tr></thead><tbody>${rows.map(a=>{
      const mc=dq?a.dests.filter(d=>d.city.toLowerCase().includes(dq)||d.code.toLowerCase().includes(dq)).length:0;
      const hl=dq&&mc>0;
      return`<tr class="${hl?"highlighted":""}" onclick="openPanel('${a.iata}')" title="Ver destinos de ${a.name}"><td class="td-iata">${a.iata}</td><td class="td-name">${a.name}</td><td class="td-status">${badge(a.status)}</td><td class="td-dest"><div class="dest-count">${hl?`<span class="badge badge-dest">${mc} coincidencia${mc!==1?"s":""}</span>`:`<strong>${a.dests.length}</strong><span>destinos</span>`}</div><div class="click-hint">Ver detalle →</div></td><td class="td-note">${a.note||'<span style="color:#C8C5BA">—</span>'}</td></tr>`;
    }).join("")}</tbody></table></div></div>`;
  }).join("")+`<div class="legend"><div class="legend-item">${badge("yes")} Beneficiario viaja solo</div><div class="legend-item">${badge("cond")} Restricciones específicas</div><div class="legend-item">${badge("no")} Empleado debe estar a bordo</div><span style="margin-left:auto;font-size:12px;color:var(--text-muted)">Clic en una fila → ver destinos</span></div>`;
}

function openPanel(iata){
  const a=DATA.find(x=>x.iata===iata);if(!a)return;
  const dq=destActive.toLowerCase();
  document.getElementById("p-iata").textContent=`${a.iata} · Zona ${a.zone} · ${a.alliance}`;
  document.getElementById("p-name").textContent=a.name;
  const mc=dq?a.dests.filter(d=>d.city.toLowerCase().includes(dq)||d.code.toLowerCase().includes(dq)).length:0;
  document.getElementById("panel-body").innerHTML=`
    <div class="panel-section">
      <div class="panel-section-title">Acuerdo ZED</div>
      <div class="info-block">
        <div class="info-row"><span class="info-key">Estado</span><span class="info-val">${badge(a.status)}</span></div>
        <div class="info-row"><span class="info-key">Alianza</span><span class="info-val">${a.alliance}</span></div>
        <div class="info-row"><span class="info-key">Clases ZED</span><span class="info-val" style="font-family:var(--mono)">${a.cls}</span></div>
        ${a.note?`<div class="info-row"><span class="info-key">Nota</span><span class="info-val" style="font-weight:400;color:var(--text-secondary)">${a.note}</span></div>`:""}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">${a.dests.length} destinos ZED${dq&&mc?` · ${mc} coinciden con "${destActive}"`:""}</div>
      <div class="dest-grid">${a.dests.map(d=>{const m=dq&&(d.city.toLowerCase().includes(dq)||d.code.toLowerCase().includes(dq));return`<div class="dest-card ${m?"match":""}"><div class="dest-city">${d.city}</div><div class="dest-code">${d.code}</div></div>`;}).join("")}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Aviso</div>
      <div class="panel-note-sm">Destinos habituales donde suele aplicar el acuerdo ZED. Confirmar disponibilidad en el ZED/MIBA Directory de IATA o con beneficios de Vueling antes de emitir.</div>
    </div>`;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("panel").classList.add("open");
}

window.clearDest=function(){destActive="";destQ="";document.getElementById("search-dest").value="";render();};
document.getElementById("panel-close").addEventListener("click",()=>{document.getElementById("overlay").classList.remove("open");document.getElementById("panel").classList.remove("open");});
document.getElementById("overlay").addEventListener("click",()=>{document.getElementById("overlay").classList.remove("open");document.getElementById("panel").classList.remove("open");});
document.getElementById("search-airline").addEventListener("input",e=>{airlineQ=e.target.value;render();});
let dt;
document.getElementById("search-dest").addEventListener("input",e=>{destQ=e.target.value;clearTimeout(dt);if(destQ.length>=2){dt=setTimeout(()=>{destActive=destQ;render();},380);}else if(!destQ){destActive="";render();}});
document.getElementById("search-dest").addEventListener("keydown",e=>{if(e.key==="Enter"){clearTimeout(dt);destActive=destQ;render();}});
document.querySelectorAll(".sidebar-btn[data-zone]").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".sidebar-btn[data-zone]").forEach(x=>x.classList.remove("active"));b.classList.add("active");activeZone=b.dataset.zone;render();}));
document.querySelectorAll(".sidebar-btn[data-status]").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".sidebar-btn[data-status]").forEach(x=>x.classList.remove("active"));b.classList.add("active");activeStatus=b.dataset.status;render();}));
render();
</script>
</body>
</html>
