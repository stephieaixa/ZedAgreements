<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZED Agreements — Vueling · Beneficiarios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface-2: #F0EFE9;
    --border: #E2E0D8;
    --border-strong: #C8C5BA;
    --text-primary: #1A1917;
    --text-secondary: #6B6860;
    --text-muted: #9E9C96;
    --accent: #E8420A;
    --accent-light: #FDF0EC;
    --green: #1A6B3C;
    --green-bg: #EBF5EF;
    --amber: #8A5C00;
    --amber-bg: #FEF6E4;
    --red: #8B1A1A;
    --red-bg: #FDEAEA;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  header h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }
  header span {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-left: auto;
  }

  /* Warning */
  .warning {
    background: var(--amber-bg);
    border-bottom: 1px solid #F0D080;
    padding: 10px 32px;
    font-size: 12px;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .warning svg { flex-shrink: 0; }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 100px); }

  /* Sidebar */
  aside {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    position: sticky;
    top: 97px;
    height: calc(100vh - 97px);
    overflow-y: auto;
  }
  .filter-group { margin-bottom: 24px; }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  input[type="text"] {
    width: 100%;
    padding: 8px 10px 8px 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .zone-btns { display: flex; flex-direction: column; gap: 4px; }
  .zone-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.12s, color 0.12s;
  }
  .zone-btn:hover { background: var(--surface-2); color: var(--text-primary); }
  .zone-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .zone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .zone-btn .count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .zone-btn.active .count { color: var(--accent); }

  .status-btns { display: flex; flex-direction: column; gap: 4px; }
  .status-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.12s, color 0.12s;
  }
  .status-btn:hover { background: var(--surface-2); color: var(--text-primary); }
  .status-btn.active { background: var(--surface-2); color: var(--text-primary); font-weight: 500; }

  /* Stats */
  .stats-row {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .stat strong { font-weight: 600; color: var(--text-primary); font-family: var(--mono); font-size: 15px; }
  .stat-div { width: 1px; height: 16px; background: var(--border); }

  /* Main */
  main { flex: 1; padding: 28px 32px; }

  .zone-section { margin-bottom: 36px; }
  .zone-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .zone-title h2 { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .zone-title .zone-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .zone-title .zone-airline-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--bg); }
  td { padding: 10px 12px; vertical-align: middle; }
  .td-iata {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    width: 56px;
  }
  .td-name { font-weight: 500; color: var(--text-primary); }
  .td-status { width: 180px; }
  .td-note { color: var(--text-secondary); font-size: 12px; max-width: 220px; }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-ok { background: var(--green-bg); color: var(--green); }
  .badge-cond { background: var(--amber-bg); color: var(--amber); }
  .badge-no { background: var(--red-bg); color: var(--red); }

  /* Empty */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty p { font-size: 14px; margin-top: 8px; }

  /* Legend */
  .legend {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }

  /* Scrollbar */
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 768px) {
    aside { display: none; }
    main { padding: 20px 16px; }
    .stats-row { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    header { padding: 14px 16px; }
    .warning { padding: 10px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">ZED</div>
  <h1>Acuerdos Vueling · Beneficiarios sin acompañante</h1>
  <span>Ref. agosto 2025</span>
</header>

<div class="warning">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  Datos orientativos — siempre verificar en el ZED/MIBA Directory oficial de IATA antes de emitir cualquier ticket.
</div>

<div class="layout">
  <aside>
    <div class="filter-group">
      <label class="filter-label">Buscar</label>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Aerolínea o código IATA…" />
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">Zona IATA</span>
      <div class="zone-btns">
        <button class="zone-btn active" data-zone="all">
          <span class="zone-dot" style="background:#9E9C96"></span>
          Todas las zonas
          <span class="count" id="cnt-all">—</span>
        </button>
        <button class="zone-btn" data-zone="1">
          <span class="zone-dot" style="background:#185FA5"></span>
          Zona 1 · Europa
          <span class="count" id="cnt-1">—</span>
        </button>
        <button class="zone-btn" data-zone="2">
          <span class="zone-dot" style="background:#1A6B3C"></span>
          Zona 2 · N. América
          <span class="count" id="cnt-2">—</span>
        </button>
        <button class="zone-btn" data-zone="3">
          <span class="zone-dot" style="background:#8A5C00"></span>
          Zona 3 · Latinoamérica
          <span class="count" id="cnt-3">—</span>
        </button>
        <button class="zone-btn" data-zone="4">
          <span class="zone-dot" style="background:#7F77DD"></span>
          Zona 4 · M. Oriente / África
          <span class="count" id="cnt-4">—</span>
        </button>
        <button class="zone-btn" data-zone="5">
          <span class="zone-dot" style="background:#D85A30"></span>
          Zona 5 · Asia / Pacífico
          <span class="count" id="cnt-5">—</span>
        </button>
        <button class="zone-btn" data-zone="6">
          <span class="zone-dot" style="background:#D4537E"></span>
          Zona 6 · Oceanía
          <span class="count" id="cnt-6">—</span>
        </button>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">Estado</span>
      <div class="status-btns">
        <button class="status-btn active" data-status="all">Todos</button>
        <button class="status-btn" data-status="yes">✓ Sin acompañante</button>
        <button class="status-btn" data-status="cond">~ Con condiciones</button>
        <button class="status-btn" data-status="no">✗ Requiere empleado</button>
      </div>
    </div>
  </aside>

  <div style="flex:1; display:flex; flex-direction:column;">
    <div class="stats-row">
      <div class="stat"><strong id="s-total">0</strong> aerolíneas</div>
      <div class="stat-div"></div>
      <div class="stat"><strong id="s-ok">0</strong> sin acompañante</div>
      <div class="stat-div"></div>
      <div class="stat"><strong id="s-cond">0</strong> con condiciones</div>
      <div class="stat-div"></div>
      <div class="stat"><strong id="s-no">0</strong> requieren empleado</div>
    </div>
    <main id="main"></main>
  </div>
</div>

<script>
const ZONES = {
  1: { name: "Europa", color: "#185FA5", dot: "#185FA5" },
  2: { name: "Norte América", color: "#1A6B3C", dot: "#1A6B3C" },
  3: { name: "Latinoamérica", color: "#8A5C00", dot: "#8A5C00" },
  4: { name: "Medio Oriente / África", color: "#534AB7", dot: "#7F77DD" },
  5: { name: "Asia / Pacífico", color: "#993C1D", dot: "#D85A30" },
  6: { name: "Oceanía", color: "#993556", dot: "#D4537E" },
};

const DATA = [
  // Zona 1 — Europa
  { name:"Iberia", iata:"IB", zone:1, status:"yes", note:"Grupo IAG – acuerdo directo con Vueling" },
  { name:"Iberia Express", iata:"I2", zone:1, status:"yes", note:"Grupo IAG" },
  { name:"British Airways", iata:"BA", zone:1, status:"yes", note:"Grupo IAG" },
  { name:"Air France", iata:"AF", zone:1, status:"yes", note:"" },
  { name:"KLM", iata:"KL", zone:1, status:"yes", note:"" },
  { name:"Lufthansa", iata:"LH", zone:1, status:"yes", note:"" },
  { name:"Swiss International", iata:"LX", zone:1, status:"yes", note:"" },
  { name:"Austrian Airlines", iata:"OS", zone:1, status:"yes", note:"" },
  { name:"Brussels Airlines", iata:"SN", zone:1, status:"yes", note:"" },
  { name:"TAP Air Portugal", iata:"TP", zone:1, status:"yes", note:"" },
  { name:"Finnair", iata:"AY", zone:1, status:"yes", note:"" },
  { name:"SAS Scandinavian", iata:"SK", zone:1, status:"yes", note:"" },
  { name:"Aegean Airlines", iata:"A3", zone:1, status:"yes", note:"" },
  { name:"LOT Polish Airlines", iata:"LO", zone:1, status:"yes", note:"" },
  { name:"Czech Airlines", iata:"OK", zone:1, status:"yes", note:"" },
  { name:"Aer Lingus", iata:"EI", zone:1, status:"yes", note:"" },
  { name:"Air Europa", iata:"UX", zone:1, status:"yes", note:"" },
  { name:"Binter Canarias", iata:"NT", zone:1, status:"yes", note:"" },
  { name:"Transavia", iata:"HV", zone:1, status:"yes", note:"" },
  { name:"easyJet", iata:"U2", zone:1, status:"yes", note:"" },
  { name:"Norwegian Air", iata:"DY", zone:1, status:"cond", note:"Solo cónyuge/pareja registrada" },
  { name:"Ryanair", iata:"FR", zone:1, status:"cond", note:"Acuerdo limitado, verificar vigencia" },
  { name:"Wizz Air", iata:"W6", zone:1, status:"cond", note:"Verificar acuerdo vigente" },
  { name:"Volotea", iata:"V7", zone:1, status:"cond", note:"Verificar acuerdo con Vueling" },
  { name:"Alitalia / ITA Airways", iata:"AZ", zone:1, status:"no", note:"Requiere empleado a bordo" },
  // Zona 2 — Norte América
  { name:"American Airlines", iata:"AA", zone:2, status:"yes", note:"Oneworld" },
  { name:"United Airlines", iata:"UA", zone:2, status:"yes", note:"" },
  { name:"Delta Air Lines", iata:"DL", zone:2, status:"yes", note:"" },
  { name:"Air Canada", iata:"AC", zone:2, status:"yes", note:"" },
  { name:"Alaska Airlines", iata:"AS", zone:2, status:"yes", note:"" },
  { name:"WestJet", iata:"WS", zone:2, status:"cond", note:"Sujeto a disponibilidad específica" },
  { name:"JetBlue", iata:"B6", zone:2, status:"cond", note:"Verificar vigencia del acuerdo" },
  // Zona 3 — Latinoamérica
  { name:"Aerolíneas Argentinas", iata:"AR", zone:3, status:"yes", note:"" },
  { name:"LATAM Airlines", iata:"LA", zone:3, status:"yes", note:"" },
  { name:"Avianca", iata:"AV", zone:3, status:"yes", note:"" },
  { name:"Copa Airlines", iata:"CM", zone:3, status:"yes", note:"" },
  { name:"SKY Airline", iata:"H2", zone:3, status:"yes", note:"" },
  { name:"Azul Brazilian Airlines", iata:"AD", zone:3, status:"cond", note:"Verificar acuerdo vigente" },
  { name:"GOL Linhas Aéreas", iata:"G3", zone:3, status:"cond", note:"Acuerdo limitado" },
  { name:"VivaAerobus", iata:"VB", zone:3, status:"cond", note:"Verificar vigencia" },
  { name:"Interjet", iata:"4O", zone:3, status:"no", note:"Acuerdo suspendido / inactivo" },
  // Zona 4 — Medio Oriente / África
  { name:"Emirates", iata:"EK", zone:4, status:"yes", note:"" },
  { name:"Qatar Airways", iata:"QR", zone:4, status:"yes", note:"Oneworld" },
  { name:"Etihad Airways", iata:"EY", zone:4, status:"yes", note:"" },
  { name:"Turkish Airlines", iata:"TK", zone:4, status:"yes", note:"" },
  { name:"Royal Air Maroc", iata:"AT", zone:4, status:"yes", note:"" },
  { name:"Ethiopian Airlines", iata:"ET", zone:4, status:"yes", note:"" },
  { name:"Kenya Airways", iata:"KQ", zone:4, status:"cond", note:"Verificar acuerdo bilateral" },
  { name:"EgyptAir", iata:"MS", zone:4, status:"cond", note:"Sujeto a disponibilidad" },
  { name:"flydubai", iata:"FZ", zone:4, status:"cond", note:"Acuerdo reciente, verificar" },
  // Zona 5 — Asia / Pacífico
  { name:"Singapore Airlines", iata:"SQ", zone:5, status:"yes", note:"" },
  { name:"Cathay Pacific", iata:"CX", zone:5, status:"yes", note:"Oneworld" },
  { name:"Japan Airlines", iata:"JL", zone:5, status:"yes", note:"Oneworld" },
  { name:"ANA All Nippon", iata:"NH", zone:5, status:"yes", note:"" },
  { name:"Korean Air", iata:"KE", zone:5, status:"yes", note:"" },
  { name:"Malaysia Airlines", iata:"MH", zone:5, status:"yes", note:"Oneworld" },
  { name:"China Southern", iata:"CZ", zone:5, status:"cond", note:"Verificar acuerdo vigente" },
  { name:"Air India", iata:"AI", zone:5, status:"cond", note:"Condiciones variables" },
  { name:"Thai Airways", iata:"TG", zone:5, status:"cond", note:"Verificar vigencia" },
  // Zona 6 — Oceanía
  { name:"Qantas", iata:"QF", zone:6, status:"yes", note:"Oneworld" },
  { name:"Air New Zealand", iata:"NZ", zone:6, status:"yes", note:"" },
  { name:"Virgin Australia", iata:"VA", zone:6, status:"cond", note:"Verificar acuerdo bilateral" },
];

let activeZone = "all";
let activeStatus = "all";
let searchVal = "";

function getBadge(s) {
  if (s === "yes") return `<span class="badge badge-ok"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Sin acompañante</span>`;
  if (s === "cond") return `<span class="badge badge-cond"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Con condiciones</span>`;
  return `<span class="badge badge-no"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Requiere empleado</span>`;
}

function render() {
  const q = searchVal.toLowerCase();
  const filtered = DATA.filter(a => {
    const mZ = activeZone === "all" || String(a.zone) === activeZone;
    const mS = activeStatus === "all" || a.status === activeStatus;
    const mQ = !q || a.name.toLowerCase().includes(q) || a.iata.toLowerCase().includes(q);
    return mZ && mS && mQ;
  });

  // Stats
  document.getElementById("s-total").textContent = filtered.length;
  document.getElementById("s-ok").textContent = filtered.filter(a=>a.status==="yes").length;
  document.getElementById("s-cond").textContent = filtered.filter(a=>a.status==="cond").length;
  document.getElementById("s-no").textContent = filtered.filter(a=>a.status==="no").length;

  // Zone counts (filtered by status+search, regardless of zone filter)
  const forCounts = DATA.filter(a => {
    const mS = activeStatus === "all" || a.status === activeStatus;
    const mQ = !q || a.name.toLowerCase().includes(q) || a.iata.toLowerCase().includes(q);
    return mS && mQ;
  });
  document.getElementById("cnt-all").textContent = forCounts.length;
  [1,2,3,4,5,6].forEach(z => {
    const el = document.getElementById("cnt-"+z);
    if (el) el.textContent = forCounts.filter(a=>a.zone===z).length;
  });

  const main = document.getElementById("main");
  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No se encontraron aerolíneas con estos filtros.</p></div>`;
    return;
  }

  const byZone = {};
  filtered.forEach(a => { if (!byZone[a.zone]) byZone[a.zone]=[]; byZone[a.zone].push(a); });

  const zoneColors = { 1:"#185FA5",2:"#1A6B3C",3:"#8A5C00",4:"#534AB7",5:"#993C1D",6:"#993556" };
  const zoneBg    = { 1:"#E6F1FB",2:"#EAF3DE",3:"#FEF6E4",4:"#EEEDFE",5:"#FAECE7",6:"#FBEAF0" };

  main.innerHTML = Object.keys(byZone).sort((a,b)=>a-b).map(z => {
    const zn = parseInt(z);
    const info = ZONES[zn];
    const rows = byZone[z];
    return `
      <div class="zone-section">
        <div class="zone-title">
          <span class="zone-num" style="background:${zoneBg[zn]};color:${zoneColors[zn]};font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;">Zona ${z}</span>
          <h2>${info.name}</h2>
          <span class="zone-airline-count">${rows.length} aerolínea${rows.length!==1?'s':''}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>IATA</th>
                <th>Aerolínea</th>
                <th>Estado beneficiario</th>
                <th>Notas</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(a=>`
                <tr>
                  <td class="td-iata">${a.iata}</td>
                  <td class="td-name">${a.name}</td>
                  <td class="td-status">${getBadge(a.status)}</td>
                  <td class="td-note">${a.note || '<span style="color:#C8C5BA">—</span>'}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }).join("") + `
    <div class="legend">
      <div class="legend-item"><span class="badge badge-ok" style="font-size:11px">Sin acompañante</span> El beneficiario puede viajar solo en vuelos ZED</div>
      <div class="legend-item"><span class="badge badge-cond" style="font-size:11px">Con condiciones</span> Acuerdo vigente pero con restricciones específicas</div>
      <div class="legend-item"><span class="badge badge-no" style="font-size:11px">Requiere empleado</span> El tripulante debe estar a bordo</div>
    </div>
  `;
}

document.getElementById("search").addEventListener("input", e => { searchVal = e.target.value; render(); });

document.querySelectorAll(".zone-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".zone-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeZone = btn.dataset.zone;
    render();
  });
});

document.querySelectorAll(".status-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".status-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeStatus = btn.dataset.status;
    render();
  });
});

render();
</script>
</body>
</html>
